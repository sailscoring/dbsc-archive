<script>
    // Logout if the authentication cookie is about to expire
    var msecsToLogoff = 25000;  // Give 25 seconds warning of logging off.
    var logoffMsecs = msecsToLogoff;

    function checkTimeout() {
        // Check whether the user is inactive and should be timed out.
        $.ajax("/Account/_CheckTimeout").done(function (data) {
            var secondsToGo = parseInt(data);
            if (secondsToGo >= 0) {
                // NB. if secondsToGo is < 0 the user is not logged in.
                if (secondsToGo <= 120) {
                    // Less than 2 minutes to go before user is logged out by the system.
                    setInterval(updateLogoffProgressBar, 1000);
                    $("#halsailLogoffModal").modal("show");
                } else {
                    // Check again in 30 seconds.
                    setTimeout(checkTimeout, 30000);
                }
            }
        });
    }

    function updateLogoffProgressBar() {
        var percentToGo = (100 - 100 * logoffMsecs / msecsToLogoff).toFixed(0);
        $("#logoffProgressBar").attr("style", "width: " + percentToGo + "%;");
        logoffMsecs = logoffMsecs - 1000;
        if (logoffMsecs <= 0) { $("#frmLogoff").submit(); }
    }

    checkTimeout();
</script>
